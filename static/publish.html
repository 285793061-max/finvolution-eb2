<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容发布 - 信也科技</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #40E0D0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7); font-size: 14px; }
        input, select, textarea {
            width: 100%;
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(64,224,208,0.3);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        textarea { min-height: 150px; resize: vertical; }
        .btn {
            background: linear-gradient(135deg, #40E0D0, #8A2BE2);
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { color: #40E0D0; text-align: center; margin-top: 15px; display: none; }

        /* 文章列表 */
        .article-list { margin-top: 40px; border-top: 1px solid rgba(64,224,208,0.2); padding-top: 20px; }
        .article-list h2 { font-size: 16px; margin-bottom: 15px; color: rgba(255,255,255,0.7); }
        .article-item {
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(64,224,208,0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .article-title { font-size: 16px; margin-bottom: 8px; font-weight: 600; }
        .article-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
        .article-content { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }
        .article-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(64,224,208,0.2);
            color: #40E0D0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>内容发布</h1>

        <div class="form-group">
            <label>标题</label>
            <input id="title" type="text" placeholder="请输入标题">
        </div>

        <div class="form-group">
            <label>类型</label>
            <select id="type">
                <option value="news">公司动态</option>
                <option value="recruit">招聘公告</option>
                <option value="event">活动通知</option>
            </select>
        </div>

        <div class="form-group">
            <label>内容</label>
            <textarea id="content" placeholder="请输入内容..."></textarea>
        </div>

        <button id="submit-btn" class="btn" onclick="submitArticle()">发布</button>
        <p class="success" id="success-msg">✅ 发布成功！</p>

        <div class="article-list">
            <h2>已发布内容</h2>
            <div id="list-container">
                <div class="article-item">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadArticles() {
            try {
                const resp = await fetch('/api/articles');
                const articles = await resp.json();
                renderList(articles);
            } catch(e) {
                document.getElementById('list-container').innerHTML = '<div class="article-item">加载失败</div>';
            }
        }

        function renderList(articles) {
            const list = document.getElementById('list-container');
            if (articles.length === 0) {
                list.innerHTML = '<div class="article-item">暂无内容</div>';
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="article-item">
                    <div class="article-title">${a.title}</div>
                    <div class="article-meta">${a.type_name} · ${formatTime(a.created_time)}</div>
                    <div class="article-content">${a.content.substring(0, 100)}...</div>
                    <div class="article-actions">
                        <button class="btn-sm" onclick="deleteArticle(${a.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function formatTime(time) {
            if (!time) return '';
            return time.replace('T', ' ').slice(0, 16);
        }

        async function submitArticle() {
            const title = document.getElementById('title').value.trim();
            const type = document.getElementById('type').value;
            const content = document.getElementById('content').value.trim();

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            try {
                const resp = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, type, content })
                });
                const result = await resp.json();
                if (result.success) {
                    document.getElementById('success-msg').style.display = 'block';
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                    loadArticles();
                } else {
                    alert('发布失败');
                }
            } catch(e) {
                alert('发布失败');
            } finally {
                btn.disabled = false;
                btn.textContent = '发布';
            }
        }

        async function deleteArticle(id) {
            if (!confirm('确定删除？')) return;
            try {
                await fetch('/api/articles?id=' + id, { method: 'DELETE' });
                loadArticles();
            } catch(e) {
                alert('删除失败');
            }
        }

        loadArticles();
    </script>
</body>
</html>
